<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Payment - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<main class="mx-auto flex min-h-screen max-w-xl items-center px-4">
    <div class="w-full rounded-3xl border border-yellow-400/25 bg-[#111] p-8 text-center">
        <h1 class="text-3xl font-semibold text-yellow-300">ToyyibPay Mock</h1>
        <p class="mt-3 text-white/70">Local development payment for quotation bill <span th:text="${billCode}">BILL</span>.</p>
        <div class="mt-8 grid gap-3">
            <a th:href="@{/payment/callback(billcode=${billCode},status_id='1')}" class="rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950">Mark Paid</a>
            <a th:href="@{/payment/callback(billcode=${billCode},status_id='3')}" class="rounded-full border border-red-500/40 px-6 py-3 font-semibold text-red-200">Mark Failed</a>
        </div>
    </div>
</main>
</body>
</html>
