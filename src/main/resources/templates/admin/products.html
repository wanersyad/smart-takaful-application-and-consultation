<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Muqmeen Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/png" th:href="@{/images/brand/mgkb.png}" href="/images/brand/mgkb.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<nav th:replace="~{fragments/layout :: adminNav('products')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
        <div>
            <h1 class="text-4xl font-semibold text-yellow-300">Manage Takaful Products</h1>
            <p class="mt-2 text-white/65">Create, read, update, and archive database-backed products.</p>
        </div>
        <div class="flex flex-col gap-3 sm:flex-row">
            <a href="/admin/content" class="rounded-full border border-yellow-400/30 px-6 py-3 text-center font-semibold text-yellow-200 hover:bg-yellow-400/10 hover:text-yellow-300"><i class="fa-solid fa-pen-nib mr-2"></i>Site Content</a>
            <a href="/admin/products/new" class="rounded-full bg-yellow-400 px-6 py-3 text-center font-semibold text-zinc-950 hover:bg-yellow-300"><i class="fa-solid fa-plus mr-2"></i>Add Product</a>
        </div>
    </div>
    <p th:if="${flashMessage}" class="mt-6 rounded-2xl border border-yellow-400/30 bg-yellow-400/10 p-4 text-yellow-200" th:text="${flashMessage}">Saved</p>
    <section class="mt-8 overflow-hidden rounded-3xl border border-yellow-400/25 bg-[#111]">
        <div class="hidden grid-cols-[.7fr,1.2fr,2fr,.7fr,.7fr] border-b border-yellow-400/15 px-5 py-4 text-xs font-semibold uppercase text-white/60 md:grid">
            <span>Icon</span><span>Name</span><span>Summary</span><span>Active</span><span>Actions</span>
        </div>
        <div th:if="${#lists.isEmpty(products)}" class="p-12 text-center text-white/65">No product records yet. Create one to populate the public product section.</div>
        <article th:each="product : ${products}" class="grid gap-3 border-b border-yellow-400/10 p-5 last:border-b-0 md:grid-cols-[.7fr,1.2fr,2fr,.7fr,.7fr] md:items-center">
            <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-yellow-400/10 text-yellow-300"><i class="fa-solid" th:classappend="${product.iconClass}"></i></div>
            <div><p class="font-semibold" th:text="${product.name}">Name</p><p class="text-xs text-white/45" th:text="${product.categoryLabel}">Category</p></div>
            <p class="text-sm leading-6 text-white/65" th:text="${product.summary != null && !#strings.isEmpty(product.summary) ? product.summary : product.description}">Summary</p>
            <span class="w-fit rounded-full px-3 py-1 text-xs font-semibold" th:classappend="${product.active} ? ' bg-emerald-400/10 text-emerald-300 border border-emerald-400/25' : ' bg-white/5 text-white/45 border border-white/10'" th:text="${product.active} ? 'Active' : 'Hidden'">Active</span>
            <div class="flex flex-wrap gap-2">
                <a th:href="@{/admin/products/{id}(id=${product.id})}" class="rounded-full border border-yellow-400/30 px-3 py-2 text-sm hover:bg-yellow-400/10 hover:text-yellow-300"><i class="fa-solid fa-eye mr-1"></i>View</a>
                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}" class="rounded-full border border-yellow-400/30 px-3 py-2 text-sm hover:bg-yellow-400/10 hover:text-yellow-300"><i class="fa-solid fa-pen-to-square mr-1"></i>Edit</a>
                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="rounded-full bg-red-600 px-3 py-2 text-sm font-semibold text-white hover:bg-red-500"><i class="fa-solid fa-box-archive mr-1"></i>Archive</button></form>
            </div>
        </article>
    </section>
</main>
</body>
</html>
