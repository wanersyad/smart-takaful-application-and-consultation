<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotation Builder - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<main class="mx-auto max-w-4xl px-4 py-10 sm:px-6 lg:px-8">
    <a th:href="@{/admin/applications/{id}(id=${application.id})}" class="text-yellow-300 hover:text-yellow-200"><i class="fa-solid fa-arrow-left mr-2"></i>Back to application</a>
    <h1 class="mt-5 text-4xl font-semibold text-yellow-300">Quotation Builder</h1>
    <p class="mt-2 text-white/65">Use one payable item per line: Item name | Description | Amount | yes/no</p>
    <form th:action="@{/admin/applications/{id}/quotation(id=${application.id})}" method="post" class="mt-8 grid gap-5 rounded-3xl border border-yellow-400/25 bg-[#111] p-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="grid gap-2 text-sm text-white/80">Admin notes<textarea name="adminNotes" rows="4" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${form.adminNotes}"></textarea></label>
        <label class="grid gap-2 text-sm text-white/80">Quotation payable items<textarea name="itemsText" rows="10" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3 font-mono text-sm" th:text="${form.itemsText}" placeholder="Family protection contribution | Monthly protection item | 150.00 | yes"></textarea></label>
        <div class="flex flex-col gap-3 sm:flex-row">
            <button class="rounded-full border border-yellow-400/30 px-6 py-3 font-semibold text-white hover:bg-yellow-400/10 hover:text-yellow-300">Save Quotation</button>
        </div>
    </form>
    <form th:if="${quotation.id != null}" th:action="@{/admin/quotations/{id}/publish(id=${quotation.id})}" method="post" class="mt-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950 hover:bg-yellow-300">Publish to Customer</button>
    </form>
</main>
</body>
</html>
