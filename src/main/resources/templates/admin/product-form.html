<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form - Muqmeen Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
    <a href="/admin/products" class="text-yellow-300 hover:text-yellow-200"><i class="fa-solid fa-arrow-left mr-2"></i>Back to products</a>
    <h1 class="mt-5 text-4xl font-semibold text-yellow-300" th:text="${formMode == 'create'} ? 'Create Product' : 'Edit Product'">Product</h1>
    <form th:action="${formMode == 'create'} ? @{/admin/products} : @{/admin/products/{id}(id=${product.id})}" th:object="${product}" method="post" class="mt-8 grid gap-6 rounded-3xl border border-yellow-400/25 bg-[#111] p-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <section class="grid gap-5 sm:grid-cols-2">
            <label class="grid gap-2 text-sm text-white/80">Product name<input th:field="*{name}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Category<label class="sr-only">Category</label><input th:field="*{categoryLabel}" placeholder="Family Protection" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Short summary<textarea th:field="*{summary}" rows="3" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></textarea></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Detailed description<textarea th:field="*{detailedDescription}" rows="5" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></textarea></label>
            <label class="grid gap-2 text-sm text-white/80">Image URL<input th:field="*{imageUrl}" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Icon choice
                <select th:field="*{iconClass}" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3 text-yellow-300">
                    <option value="fa-shield-halved">Shield</option>
                    <option value="fa-heart-pulse">Health</option>
                    <option value="fa-hand-holding-heart">Family care</option>
                    <option value="fa-user-graduate">Education</option>
                    <option value="fa-seedling">Savings</option>
                </select>
            </label>
            <label class="grid gap-2 text-sm text-white/80">Eligibility<textarea th:field="*{eligibility}" rows="4" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></textarea></label>
            <label class="grid gap-2 text-sm text-white/80">Coverage purpose<textarea th:field="*{coveragePurpose}" rows="4" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></textarea></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Terms and notes<textarea th:field="*{termsNotes}" rows="4" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></textarea></label>
        </section>
        <section class="grid gap-5">
            <label class="grid gap-2 text-sm text-white/80">Benefits, one per line<textarea name="benefitsText" rows="5" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${benefitsText}"></textarea></label>
            <label class="grid gap-2 text-sm text-white/80">Coverage items, one per line as: Item name | Explanation<textarea name="coverageText" rows="5" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${coverageText}"></textarea></label>
            <label class="grid gap-2 text-sm text-white/80">Requirements, one per line<textarea name="requirementsText" rows="5" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${requirementsText}"></textarea></label>
            <label class="grid gap-2 text-sm text-white/80">Documents, one per line as: Label | URL | Type<textarea name="documentsText" rows="4" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${documentsText}"></textarea></label>
        </section>
        <section class="grid gap-3 rounded-2xl border border-yellow-400/15 bg-black p-5">
            <label class="flex items-center gap-3"><input type="checkbox" th:field="*{featured}" class="h-5 w-5 accent-yellow-400"> <span>Mark as featured/popular</span></label>
            <label class="flex items-center gap-3"><input type="checkbox" th:field="*{active}" class="h-5 w-5 accent-yellow-400"> <span>Show this product publicly</span></label>
        </section>
        <button class="rounded-full bg-yellow-400 px-6 py-4 font-semibold text-zinc-950 hover:bg-yellow-300">Save Product</button>
    </form>
</main>
</body>
</html>
