<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Return - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<main class="mx-auto flex min-h-screen max-w-xl items-center px-4">
    <div class="w-full rounded-3xl border border-yellow-400/25 bg-[#111] p-8 text-center">
        <h1 class="text-3xl font-semibold text-yellow-300">Payment Return Received</h1>
        <p class="mt-3 text-white/70">We received the gateway return for bill <span th:text="${billCode}">bill</span>. Final status is confirmed by callback.</p>
        <a href="/account" class="mt-8 inline-flex rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950">Back to Account</a>
    </div>
</main>
</body>
</html>
