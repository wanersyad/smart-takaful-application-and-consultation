<!DOCTYPE html>
<html lang="en" class="bg-[#050505]" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/png" th:href="@{/images/brand/mgkb.png}" href="/images/brand/mgkb.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page min-h-screen bg-[#050505] text-white flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-transparent">
        <a href="/" class="mb-8 flex items-center justify-center gap-3">
            <img th:src="@{/images/brand/mgkb.png}" src="/images/brand/mgkb.png" alt="Muqmeen Group logo"
                 class="h-14 w-14 object-contain">
            <span class="logo-wordmark text-sm leading-none text-yellow-400">
                MUQMEEN <span class="logo-wordmark-strong text-yellow-300">GROUP</span>
            </span>
        </a>

        <section class="brand-shell rounded-xl p-8">
            <h1 class="text-2xl font-semibold text-zinc-950">Choose a new password</h1>
            <p class="mt-1 text-sm text-zinc-500">Use the reset link sent to your email. Links expire after 30 minutes.</p>

            <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="mt-6 space-y-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{token}">

                <div th:if="${#fields.hasErrors('token')}" class="rounded-lg border border-amber-300/40 bg-yellow-400/10 p-3 text-sm text-yellow-100">
                    <span th:errors="*{token}">Invalid token</span>
                </div>

                <div>
                    <label for="password" class="mb-1 block text-sm font-semibold text-zinc-700">New password</label>
                    <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required autofocus
                           class="w-full rounded-lg border border-zinc-300 px-4 py-2 outline-none focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-1 text-xs text-yellow-700">Password error</p>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-yellow-400 py-3 font-semibold text-zinc-950 smooth-transition hover:bg-yellow-300">
                    Update password
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-zinc-500">
                <a th:href="@{/login}" class="font-semibold text-zinc-950 hover:text-yellow-600">Back to sign in</a>
            </p>
        </section>
    </main>
</body>
</html>
