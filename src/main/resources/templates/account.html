<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<nav th:replace="~{fragments/layout :: nav('account')}"></nav>
<main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <p th:if="${flashMessage}" class="mb-6 rounded-2xl border border-yellow-400/30 bg-yellow-400/10 p-4 text-yellow-200" th:text="${flashMessage}">Saved</p>
    <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
        <div class="flex flex-col gap-5 sm:flex-row sm:items-center">
            <div class="h-20 w-20 overflow-hidden rounded-3xl border border-yellow-400/30 bg-yellow-400/10">
                <img th:if="${profile.profilePicture != null}" th:src="@{/files/{id}(id=${profile.profilePicture.id})}" alt="Profile picture" class="h-full w-full object-cover">
                <div th:if="${profile.profilePicture == null}" class="flex h-full w-full items-center justify-center text-2xl text-yellow-300"><i class="fa-solid fa-user"></i></div>
            </div>
            <div>
                <p class="text-white/65">Signed in as <span class="font-semibold text-white" th:text="${customer.fullName}">Customer</span></p>
                <h1 class="mt-2 text-4xl font-semibold text-yellow-300">My Takaful Applications</h1>
            </div>
        </div>
        <a href="/account/profile" class="rounded-full border border-yellow-400/30 px-6 py-3 text-center font-semibold text-white hover:bg-yellow-400/10 hover:text-yellow-300">Update Profile</a>
    </div>

    <section class="mt-8 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
        <div class="rounded-2xl border border-yellow-400/25 bg-[#111] p-5"><p class="text-xs uppercase text-white/50">Total</p><p class="mt-2 text-3xl font-semibold" th:text="${totalApplications}">0</p></div>
        <div class="rounded-2xl border border-yellow-400/25 bg-[#111] p-5"><p class="text-xs uppercase text-white/50">Drafts</p><p class="mt-2 text-3xl font-semibold" th:text="${draftApplications}">0</p></div>
        <div class="rounded-2xl border border-yellow-400/25 bg-[#111] p-5"><p class="text-xs uppercase text-white/50">Review</p><p class="mt-2 text-3xl font-semibold" th:text="${reviewApplications}">0</p></div>
        <div class="rounded-2xl border border-yellow-400/25 bg-[#111] p-5"><p class="text-xs uppercase text-white/50">Quoted / Paid</p><p class="mt-2 text-3xl font-semibold"><span th:text="${quotedApplications}">0</span>/<span th:text="${paidApplications}">0</span></p></div>
    </section>

    <section class="mt-8 overflow-hidden rounded-3xl border border-yellow-400/25 bg-[#111]">
        <div class="hidden grid-cols-[1fr,1.2fr,1fr,1fr,1fr] border-b border-yellow-400/15 px-5 py-4 text-xs font-semibold uppercase tracking-wide text-white/60 md:grid">
            <span>Date</span><span>Product</span><span>Status</span><span>Quotation</span><span>Action</span>
        </div>
        <div th:if="${#lists.isEmpty(applications)}" class="p-12 text-center text-white/65">
            <i class="fa-regular fa-folder-open mb-3 block text-4xl"></i>
            Your application records will appear here after you start a product application.
        </div>
        <article th:each="app : ${applications}" class="grid gap-3 border-b border-yellow-400/10 p-5 last:border-b-0 md:grid-cols-[1fr,1.2fr,1fr,1fr,1fr] md:items-center">
            <p class="text-sm text-white/65" th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">Date</p>
            <p class="font-semibold text-white" th:text="${app.product.name}">Product</p>
            <p><span class="rounded-full border border-yellow-400/25 bg-yellow-400/10 px-3 py-1 text-xs font-semibold text-yellow-200" th:text="${app.status}">DRAFT</span></p>
            <p class="text-sm text-white/65" th:text="${app.quotation == null ? 'Not issued' : app.quotation.status + ' / RM ' + #numbers.formatDecimal(app.quotation.selectedTotal(), 1, 2)}">Not issued</p>
            <a th:href="@{/applications/{id}(id=${app.id})}" class="rounded-full bg-yellow-400 px-4 py-2 text-center text-sm font-semibold text-zinc-950 hover:bg-yellow-300">Open</a>
        </article>
    </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: menu-script}"></script>
</body>
</html>
