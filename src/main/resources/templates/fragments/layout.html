<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body>

<!--
  Shared site navigation.
  Usage: <nav th:replace="~{fragments/layout :: siteNav('products')}"></nav>
  The argument is the active section key ('home','products','faq','contact','account',null).
-->
<nav th:fragment="siteNav(active)" class="sticky top-0 z-40 border-b border-yellow-400/20 bg-[#0d0d0d]/95 backdrop-blur">
    <div class="mx-auto flex min-h-16 max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <a href="/" class="flex items-center gap-3">
            <img th:src="@{/images/brand/mgkb.png}" src="/images/brand/mgkb.png" alt="Muqmeen Group logo" class="h-12 w-12 object-contain">
            <span class="logo-wordmark text-sm text-yellow-400">MUQMEEN <span class="logo-wordmark-strong text-yellow-300">GROUP</span></span>
        </a>
        <button type="button" class="page-menu-open flex h-11 w-11 items-center justify-center rounded-full border border-yellow-400/25 text-yellow-300 hover:bg-yellow-400/10 md:hidden" aria-label="Open navigation">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="hidden items-center gap-2 text-sm font-medium md:flex">
            <a href="/" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'home'} ? ' is-active text-yellow-300' : ''">Home</a>
            <a href="/#about" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'about'} ? ' is-active text-yellow-300' : ''">About</a>
            <a href="/#products" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'products'} ? ' is-active text-yellow-300' : ''">Products</a>
            <a href="/#faq" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'faq'} ? ' is-active text-yellow-300' : ''">FAQ</a>
            <a href="/#contact" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'contact'} ? ' is-active text-yellow-300' : ''">Contact</a>
            <!-- Admin -->
            <a th:if="${authState != null and authState.admin}" href="/admin/dashboard" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'admin'} ? ' is-active text-yellow-300' : ''">Admin</a>
            <form th:if="${authState != null and authState.admin}" th:action="@{/logout}" method="post" class="ml-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950 transition hover:-translate-y-0.5 hover:bg-yellow-300"><i class="fa-solid fa-right-from-bracket mr-1"></i>Logout</button>
            </form>
            <!-- Customer -->
            <a th:if="${authState != null and authState.customer}" href="/account" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'account'} ? ' is-active text-yellow-300' : ''">Account</a>
            <form th:if="${authState != null and authState.customer}" th:action="@{/logout}" method="post" class="ml-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950 transition hover:-translate-y-0.5 hover:bg-yellow-300"><i class="fa-solid fa-right-from-bracket mr-1"></i>Logout</button>
            </form>
            <!-- Signed out -->
            <a th:if="${authState == null or !authState.signedIn()}" href="/login" class="ml-2 rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950 transition hover:-translate-y-0.5 hover:bg-yellow-300">Log In</a>
        </div>
    </div>
    <div class="page-mobile-menu hidden border-t border-yellow-400/15 px-4 pb-4 md:hidden">
        <div class="grid gap-2 rounded-2xl border border-yellow-400/15 bg-white/[0.03] p-2 text-sm">
            <a href="/" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Home</a>
            <a href="/#about" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">About</a>
            <a href="/#products" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Products</a>
            <a href="/#faq" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">FAQ</a>
            <a href="/#contact" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Contact</a>
            <a th:if="${authState != null and authState.admin}" href="/admin/dashboard" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Admin</a>
            <a th:if="${authState != null and authState.customer}" href="/account" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Account</a>
            <a th:if="${authState == null or !authState.signedIn()}" href="/login" class="rounded-xl bg-yellow-400 px-4 py-3 text-center font-semibold text-zinc-950 hover:bg-yellow-300">Log In</a>
            <form th:if="${authState != null and authState.signedIn()}" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="w-full rounded-xl bg-yellow-400 px-4 py-3 text-center font-semibold text-zinc-950 hover:bg-yellow-300">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!--
  Admin navigation. Usage: <nav th:replace="~{fragments/layout :: adminNav('applications')}"></nav>
  active key: 'applications' | 'customers' | 'products' | 'content'
-->
<nav th:fragment="adminNav(active)" class="sticky top-0 z-40 border-b border-yellow-400/20 bg-[#0d0d0d]/95 backdrop-blur">
    <div class="mx-auto flex min-h-16 max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <a href="/admin/dashboard" class="flex items-center gap-3">
            <img th:src="@{/images/brand/mgkb.png}" src="/images/brand/mgkb.png" alt="Muqmeen Group logo" class="h-11 w-11 object-contain">
            <span class="logo-wordmark text-sm text-yellow-400">MUQMEEN <span class="logo-wordmark-strong text-yellow-300">ADMIN</span></span>
        </a>
        <button type="button" class="page-menu-open flex h-11 w-11 items-center justify-center rounded-full border border-yellow-400/25 text-yellow-300 hover:bg-yellow-400/10 md:hidden" aria-label="Open navigation">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="hidden items-center gap-2 text-sm font-medium md:flex">
            <a href="/admin/dashboard" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'applications'} ? ' is-active text-yellow-300' : ''">Applications</a>
            <a href="/admin/customers" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'customers'} ? ' is-active text-yellow-300' : ''">Customers</a>
            <a href="/admin/products" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'products'} ? ' is-active text-yellow-300' : ''">Products</a>
            <a href="/admin/content" class="nav-link rounded-full px-4 py-2 text-white/80" th:classappend="${active == 'content'} ? ' is-active text-yellow-300' : ''">Content</a>
            <form th:action="@{/logout}" method="post" class="ml-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="rounded-full bg-yellow-400 px-6 py-3 font-semibold text-zinc-950 transition hover:-translate-y-0.5 hover:bg-yellow-300"><i class="fa-solid fa-right-from-bracket mr-1"></i>Logout</button>
            </form>
        </div>
    </div>
    <div class="page-mobile-menu hidden border-t border-yellow-400/15 px-4 pb-4 md:hidden">
        <div class="grid gap-2 rounded-2xl border border-yellow-400/15 bg-white/[0.03] p-2 text-sm">
            <a href="/admin/dashboard" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Applications</a>
            <a href="/admin/customers" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Customers</a>
            <a href="/admin/products" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Products</a>
            <a href="/admin/content" class="rounded-xl px-4 py-3 text-white hover:bg-yellow-400/10 hover:text-yellow-300">Content</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="w-full rounded-xl bg-yellow-400 px-4 py-3 text-center font-semibold text-zinc-950 hover:bg-yellow-300">Logout</button>
            </form>
        </div>
    </div>
</nav>

<!-- Shared footer. Usage: <footer th:replace="~{fragments/layout :: footer}"></footer> -->
<footer th:fragment="footer" class="border-t border-yellow-400/15 bg-[#0d0d0d]">
    <div class="mx-auto max-w-7xl px-4 py-8 text-center text-xs text-white/45 sm:px-6 lg:px-8">
        <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> Muqmeen Group. All rights reserved.</p>
    </div>
</footer>

<!-- Shared scripts (mobile menu + themed selects). Usage: <th:block th:replace="~{fragments/layout :: page-scripts}"></th:block> -->
<th:block th:fragment="page-scripts">
    <script>
        document.querySelectorAll('.page-menu-open').forEach((button) => {
            button.addEventListener('click', () => {
                const menu = document.querySelector('.page-mobile-menu');
                if (menu) menu.classList.toggle('hidden');
            });
        });
    </script>
    <script th:src="@{/js/theme-select.js}" defer></script>
</th:block>

<!-- Back-compat alias: older pages call menu-script. -->
<th:block th:fragment="menu-script">
    <script>
        document.querySelectorAll('.page-menu-open').forEach((button) => {
            button.addEventListener('click', () => {
                const menu = document.querySelector('.page-mobile-menu');
                if (menu) menu.classList.toggle('hidden');
            });
        });
    </script>
    <script th:src="@{/js/theme-select.js}" defer></script>
</th:block>

</body>
</html>
