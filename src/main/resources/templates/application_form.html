<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Draft - Muqmeen Group</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="muqmeen-dark-site min-h-screen bg-[#050505] text-white">
<main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
    <a th:href="@{/applications/{id}(id=${application.id})}" class="text-yellow-300 hover:text-yellow-200"><i class="fa-solid fa-arrow-left mr-2"></i>Back to application</a>
    <h1 class="mt-5 text-4xl font-semibold text-yellow-300">Takaful Application</h1>
    <p class="mt-2 text-white/65">Product: <span class="font-semibold text-white" th:text="${application.product.name}">Product</span></p>
    <p th:if="${flashMessage}" class="mt-5 rounded-2xl border border-yellow-400/30 bg-yellow-400/10 p-4 text-yellow-200" th:text="${flashMessage}">Message</p>

    <form th:action="@{/applications/{id}(id=${application.id})}" method="post" enctype="multipart/form-data" class="mt-8 space-y-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <section class="grid gap-5 rounded-3xl border border-yellow-400/25 bg-[#111] p-6 sm:grid-cols-2">
            <h2 class="sm:col-span-2 text-2xl font-semibold text-yellow-300">Applicant Details</h2>
            <label class="grid gap-2 text-sm text-white/80">Full name<input name="applicantFullName" th:value="${form.applicantFullName}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Email address<input name="email" type="email" th:value="${form.email}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Phone number<input name="phoneNumber" th:value="${form.phoneNumber}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Annual income<input name="annualIncome" type="number" step="0.01" th:value="${form.annualIncome}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Home address<textarea name="homeAddress" rows="3" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${form.homeAddress}"></textarea></label>
        </section>

        <section class="grid gap-5 rounded-3xl border border-yellow-400/25 bg-[#111] p-6 sm:grid-cols-2">
            <h2 class="sm:col-span-2 text-2xl font-semibold text-yellow-300">Employment and Bank</h2>
            <label class="grid gap-2 text-sm text-white/80">Occupation<input name="occupation" th:value="${form.occupation}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Position<input name="positionTitle" th:value="${form.positionTitle}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Employer name<input name="employerName" th:value="${form.employerName}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Bank name<input name="bankName" th:value="${form.bankName}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Bank account number<input name="bankAccountNumber" th:value="${form.bankAccountNumber}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Height (cm)<input name="heightCm" type="number" step="0.1" th:value="${form.heightCm}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Weight (kg)<input name="weightKg" type="number" step="0.1" th:value="${form.weightKg}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Workplace address<textarea name="workplaceAddress" rows="3" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${form.workplaceAddress}"></textarea></label>
        </section>

        <section class="grid gap-5 rounded-3xl border border-yellow-400/25 bg-[#111] p-6 sm:grid-cols-2">
            <h2 class="sm:col-span-2 text-2xl font-semibold text-yellow-300">Documents</h2>
            <label class="grid gap-2 text-sm text-white/80">IC front image<input name="icFront" type="file" accept="image/png,image/jpeg,image/webp" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">IC back image<input name="icBack" type="file" accept="image/png,image/jpeg,image/webp" class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <div class="sm:col-span-2">
                <p class="mb-2 text-sm text-white/80">Signature</p>
                <canvas id="signature-pad" width="900" height="220" class="w-full rounded-2xl border border-yellow-400/25 bg-white"></canvas>
                <input type="hidden" name="signatureDataUrl" id="signatureDataUrl">
                <button type="button" id="clear-signature" class="mt-3 rounded-full border border-yellow-400/30 px-4 py-2 text-sm text-white hover:bg-yellow-400/10 hover:text-yellow-300">Clear signature</button>
            </div>
        </section>

        <section class="grid gap-5 rounded-3xl border border-yellow-400/25 bg-[#111] p-6 sm:grid-cols-2">
            <h2 class="sm:col-span-2 text-2xl font-semibold text-yellow-300">Nominee Information</h2>
            <label class="grid gap-2 text-sm text-white/80">Full name<input name="nominee1FullName" th:value="${form.nominee1FullName}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">IC number<input name="nominee1IcNumber" th:value="${form.nominee1IcNumber}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Relationship<input name="nominee1Relationship" th:value="${form.nominee1Relationship}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Phone number<input name="nominee1PhoneNumber" th:value="${form.nominee1PhoneNumber}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="grid gap-2 text-sm text-white/80">Occupation<input name="nominee1Occupation" th:value="${form.nominee1Occupation}" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3"></label>
            <label class="sm:col-span-2 grid gap-2 text-sm text-white/80">Home address<textarea name="nominee1HomeAddress" rows="3" required class="rounded-2xl border border-yellow-400/25 bg-black px-4 py-3" th:text="${form.nominee1HomeAddress}"></textarea></label>
        </section>

        <div class="flex flex-col gap-3 sm:flex-row">
            <button name="action" value="draft" class="rounded-full border border-yellow-400/30 px-6 py-4 font-semibold text-white hover:bg-yellow-400/10 hover:text-yellow-300">Save Draft</button>
            <button name="action" value="submit" class="rounded-full bg-yellow-400 px-6 py-4 font-semibold text-zinc-950 hover:bg-yellow-300">Submit Application</button>
        </div>
    </form>
</main>
<script>
const canvas = document.getElementById('signature-pad');
const ctx = canvas.getContext('2d');
ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#111';
let drawing = false;
function pos(e) { const r = canvas.getBoundingClientRect(); const p = e.touches ? e.touches[0] : e; return {x:(p.clientX-r.left)*(canvas.width/r.width), y:(p.clientY-r.top)*(canvas.height/r.height)}; }
function start(e){ drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
function move(e){ if(!drawing) return; const p = pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); document.getElementById('signatureDataUrl').value = canvas.toDataURL('image/png'); e.preventDefault(); }
function end(){ drawing = false; document.getElementById('signatureDataUrl').value = canvas.toDataURL('image/png'); }
canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', move); window.addEventListener('touchend', end);
document.getElementById('clear-signature').addEventListener('click', () => { ctx.clearRect(0,0,canvas.width,canvas.height); document.getElementById('signatureDataUrl').value=''; });
</script>
</body>
</html>
