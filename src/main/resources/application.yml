spring:
  application:
    name: takaful-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  thymeleaf:
    cache: false
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
          connectiontimeout: ${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SPRING_MAIL_SMTP_TIMEOUT:10000}
          writetimeout: ${SPRING_MAIL_SMTP_WRITE_TIMEOUT:10000}
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:30MB}

server:
  port: ${PORT:8080}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

contact:
  recipient: ${CONTACT_RECIPIENT:s72370@ocean.umt.edu.my}
  from: ${CONTACT_FROM:${SPRING_MAIL_USERNAME:no-reply@muqmeengroup.local}}
  delivery: ${CONTACT_DELIVERY:auto}
  resend:
    api-key: ${RESEND_API_KEY:}
    base-url: ${RESEND_BASE_URL:https://api.resend.com}
  formsubmit:
    enabled: ${CONTACT_FORMSUBMIT_ENABLED:true}
    base-url: ${CONTACT_FORMSUBMIT_BASE_URL:https://formsubmit.co/ajax}

toyyibpay:
  mode: ${TOYYIBPAY_MODE:mock}
  secret-key: ${TOYYIBPAY_SECRET_KEY:}
  category-code: ${TOYYIBPAY_CATEGORY_CODE:}
  base-url: ${TOYYIBPAY_BASE_URL:https://dev.toyyibpay.com}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
  connect-timeout-ms: 3000
  read-timeout-ms: 20000

file-storage:
  mode: ${FILE_STORAGE_MODE:local}
  local-upload-dir: ${LOCAL_UPLOAD_DIR:uploads}
  supabase-url: ${SUPABASE_URL:}
  supabase-service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  supabase-bucket: ${SUPABASE_STORAGE_BUCKET:takaful-private}
